<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="48" fill="#1a2260"/>
  <!-- Bus body -->
  <rect x="48" y="60" width="120" height="80" rx="16" fill="#005eb8"/>
  <rect x="48" y="60" width="120" height="30" rx="16" fill="#003d7a"/>
  <rect x="48" y="76" width="120" height="14" fill="#003d7a"/>
  <!-- Windows -->
  <rect x="60" y="66" width="24" height="18" rx="4" fill="#8ecae6"/>
  <rect x="90" y="66" width="24" height="18" rx="4" fill="#8ecae6"/>
  <rect x="120" y="66" width="24" height="18" rx="4" fill="#8ecae6"/>
  <!-- Wheels -->
  <circle cx="80" cy="144" r="12" fill="#333"/>
  <circle cx="80" cy="144" r="6" fill="#666"/>
  <circle cx="136" cy="144" r="12" fill="#333"/>
  <circle cx="136" cy="144" r="6" fill="#666"/>
  <!-- Door -->
  <rect x="98" y="96" width="16" height="40" rx="3" fill="#003d7a" stroke="#8ecae6" stroke-width="1"/>
  <!-- Route badge -->
  <rect x="170" y="56" width="48" height="28" rx="8" fill="#DA2128"/>
  <text x="194" y="76" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">154</text>
  <!-- Time indicators -->
  <circle cx="180" cy="108" r="6" fill="#4caf50"/>
  <rect x="192" y="104" width="36" height="8" rx="4" fill="#4caf50"/>
  <circle cx="180" cy="130" r="6" fill="#4caf50"/>
  <rect x="192" y="126" width="28" height="8" rx="4" fill="#4caf50" opacity="0.7"/>
  <circle cx="180" cy="152" r="6" fill="#4caf50"/>
  <rect x="192" y="148" width="20" height="8" rx="4" fill="#4caf50" opacity="0.4"/>
  <!-- Bottom color bar (3 providers) -->
  <rect x="48" y="180" width="54" height="6" rx="3" fill="#DA2128"/>
  <rect x="106" y="180" width="54" height="6" rx="3" fill="#005eb8"/>
  <rect x="164" y="180" width="54" height="6" rx="3" fill="#ea580c"/>
</svg>
