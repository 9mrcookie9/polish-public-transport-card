  <!-- Row 2 -->
  <rect x="48" y="102" width="44" height="32" rx="9" fill="#005eb8"/>
  <rect x="104" y="110" width="76" height="7" rx="3.5" fill="#6a7aaa"/>
  <rect x="104" y="123" width="48" height="5" rx="2.5" fill="#4a5a8a"/>
  <circle cx="212" cy="118" r="9" fill="#4caf50"/>
  
  <!-- Row 3 -->
  <rect x="48" y="152" width="44" height="32" rx="9" fill="#ea580c"/>
  <rect x="104" y="160" width="64" height="7" rx="3.5" fill="#6a7aaa"/>
  <rect x="104" y="173" width="40" height="5" rx="2.5" fill="#4a5a8a"/>
