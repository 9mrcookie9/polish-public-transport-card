name: CI

on:
  push:
    branches: [main, code-cleanup, '**']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-gtfsrt:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: pip install -r requirements_test.txt
      - name: Test GTFS-RT provider
        run: python -m pytest tests/test_provider_gtfsrt.py -q --tb=short

  test-kiedyprzyjedzie:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: pip install -r requirements_test.txt
      - name: Test KiedyPrzyjedzie provider
        run: python -m pytest tests/test_kiedyprzyjedzie_extra.py -q --tb=short

  test-time4bus:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: pip install -r requirements_test.txt
      - name: Test Time4Bus provider
        run: python -m pytest tests/test_time4bus_tczew.py -q --tb=short

  test-plk:
    runs-on: self-hosted
    if: always()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: pip install -r requirements_test.txt
      - name: Test PLK provider
        if: env.PLK_API_KEY != ''
        env:
          PLK_API_KEY: ${{ secrets.PLK_API_KEY }}
        run: python -m pytest tests/test_extended.py -q --tb=short -k "plk"
      - name: Skip PLK (no API key)
        if: env.PLK_API_KEY == ''
        env:
          PLK_API_KEY: ${{ secrets.PLK_API_KEY }}
        run: echo "PLK tests skipped - no API key configured"

  test-integration:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: pip install -r requirements_test.txt
      - name: Test integration
        run: python -m pytest tests/test_integration.py tests/test_extended.py -q --tb=short

  e2e:
    runs-on: self-hosted
    needs: [test-gtfsrt, test-kiedyprzyjedzie, test-time4bus, test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test
        env:
          HA_URL: http://localhost:8123

  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check Python syntax
        run: python -m py_compile custom_components/mzkzg_transport/*.py
      - name: Check JS syntax
        run: node --check custom_components/mzkzg_transport/www/mzkzg-transport-card.js

  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest
        run: |
          python3 << 'EOF'
          import json
          m=json.load(open('custom_components/mzkzg_transport/manifest.json'))
          assert 'version' in m
          assert 'domain' in m
          print(f'OK: {m["domain"]} v{m["version"]}')
          EOF
      - name: Validate translations
        run: |
          python3 << 'EOF'
          import json
          en = set(json.load(open('custom_components/mzkzg_transport/translations/en.json')).keys())
          pl = set(json.load(open('custom_components/mzkzg_transport/translations/pl.json')).keys())
          assert en == pl, f'Mismatch: {en ^ pl}'
          print('Translations OK')
          EOF
      - name: Validate HACS
        run: |
          python3 << 'EOF'
          import json
          h=json.load(open('hacs.json'))
          assert 'name' in h
          print(f'HACS OK: {h["name"]}')
          EOF
