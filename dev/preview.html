<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>MZKZG Card Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Roboto, "Noto Sans", Helvetica, Arial, sans-serif; background: transparent; }
    .card-section { display: inline-block; width: 370px; }
    .dark-vars {
      --primary-color: #60a5fa; --primary-text-color: #e5e7eb; --secondary-text-color: #9ca3af;
      --divider-color: rgba(255,255,255,0.1); --card-background-color: #1f2937;
      --ha-card-header-font-family: Roboto, "Noto Sans", Helvetica, Arial, sans-serif;
      --ha-card-border-radius: 12px; --ha-card-box-shadow: none;
    }
    .light-vars {
      --primary-color: #005eb8; --primary-text-color: #1f2937; --secondary-text-color: #6b7280;
      --divider-color: rgba(31,41,55,0.12); --card-background-color: #ffffff;
      --ha-card-header-font-family: Roboto, "Noto Sans", Helvetica, Arial, sans-serif;
      --ha-card-border-radius: 12px; --ha-card-box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="card-standard-light" class="card-section light-vars"></div>
  <div id="card-standard-dark" class="card-section dark-vars"></div>
  <div id="card-compact" class="card-section light-vars"></div>
  <div id="card-eink" class="card-section light-vars"></div>
  <div id="card-plk" class="card-section light-vars"></div>
  <div id="card-tabs" class="card-section dark-vars"></div>
  <div id="card-mixed" class="card-section light-vars"></div>

  <script>
    if (!customElements.get("ha-card")) customElements.define("ha-card", class extends HTMLElement {});
    if (!customElements.get("ha-icon")) {
      customElements.define("ha-icon", class extends HTMLElement {
        static get observedAttributes() { return ["icon"]; }
        connectedCallback() { this._r(); }
        attributeChangedCallback() { this._r(); }
        _r() {
          const m = {"mdi:train":`<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12,2C8,2 4,2.5 4,6V15.5A3.5,3.5 0 0,0 7.5,19L6,20.5V21H8.23L10.23,19H14L16,21H18V20.5L16.5,19A3.5,3.5 0 0,0 20,15.5V6C20,2.5 16.42,2 12,2M7.5,17A1.5,1.5 0 0,1 6,15.5A1.5,1.5 0 0,1 7.5,14A1.5,1.5 0 0,1 9,15.5A1.5,1.5 0 0,1 7.5,17M11,10H6V6H11V10M13,10V6H18V10H13M16.5,17A1.5,1.5 0 0,1 15,15.5A1.5,1.5 0 0,1 16.5,14A1.5,1.5 0 0,1 18,15.5A1.5,1.5 0 0,1 16.5,17Z"/></svg>`,"mdi:bus-stop":`<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M22 7V16C22 16.71 21.62 17.36 21 17.72V19.25C21 19.66 20.66 20 20.25 20H19.75C19.34 20 19 19.66 19 19.25V18H12V19.25C12 19.66 11.66 20 11.25 20H10.75C10.34 20 10 19.66 10 19.25V17.72C9.39 17.36 9 16.71 9 16V7C9 4 12 4 15.5 4S22 4 22 7M13 15C13 14.45 12.55 14 12 14S11 14.45 11 15 11.45 16 12 16 13 15.55 13 15M20 15C20 14.45 19.55 14 19 14S18 14.45 18 15 18.45 16 19 16 20 15.55 20 15M20 7H11V11H20V7M7 9.5C6.97 8.12 5.83 7 4.45 7.05C3.07 7.08 1.97 8.22 2 9.6C2.03 10.77 2.86 11.77 4 12V20H5V12C6.18 11.76 7 10.71 7 9.5Z"/></svg>`};
          this.innerHTML = m[this.getAttribute("icon")] || m["mdi:bus-stop"];
        }
      });
    }

    function t(min, delay=0) { return new Date(Date.now() + min*60000 + delay*1000).toISOString(); }

    // Real data from ZTM Gdańsk stop 1205 (Brama Wyżynna 01) - captured 2026-05-14
    const ztmDeps = [
      { route:"154", headsign:"Orunia Górna", estimated_time:t(3,291), theoretical_time:t(0), realtime:true, delay_seconds:291, vehicle_code:"2652", bike_allowed:true, wheelchair_accessible:true, air_conditioning:true, usb:true, ticket_machine:true, provider:"ztm_gdansk" },
      { route:"132", headsign:"Pruszcz Zastawna/Rondo", estimated_time:t(5,315), theoretical_time:t(2), realtime:true, delay_seconds:315, vehicle_code:"8303", provider:"ztm_gdansk" },
      { route:"189", headsign:"Starogardzka", estimated_time:t(7,196), theoretical_time:t(4), realtime:true, delay_seconds:196, vehicle_code:"2835", wheelchair_accessible:true, air_conditioning:true, provider:"ztm_gdansk" },
      { route:"289", headsign:"Starogardzka", estimated_time:t(12,146), theoretical_time:t(10), realtime:true, delay_seconds:146, vehicle_code:"2761", provider:"ztm_gdansk" },
      { route:"154", headsign:"Orunia Górna", estimated_time:t(16,258), theoretical_time:t(12), realtime:true, delay_seconds:258, vehicle_code:"2679", bike_allowed:true, wheelchair_accessible:true, air_conditioning:true, provider:"ztm_gdansk" },
    ];

    // Real data from ZKM Gdynia stop 38220 - captured 2026-05-14
    const zkmDeps = [
      { route:"114", headsign:"Chylonia Dworzec PKP", estimated_time:t(2), theoretical_time:t(3), realtime:true, delay_seconds:-31, vehicle_code:"5005", wheelchair_accessible:true, provider:"zkm_gdynia" },
      { route:"114", headsign:"Chylonia Dworzec PKP", estimated_time:t(8), theoretical_time:t(9), realtime:true, delay_seconds:-73, vehicle_code:"3070", provider:"zkm_gdynia" },
      { route:"102", headsign:"Chylonia Dworzec PKP", estimated_time:t(14,922), theoretical_time:t(2), realtime:true, delay_seconds:922, vehicle_code:"7861", provider:"zkm_gdynia" },
    ];

    // PLK mock (no real API key available)
    const plkDeps = [
      { route:"SKM", headsign:"Gdynia Główna", estimated_time:t(4,180), theoretical_time:t(1), realtime:true, delay_seconds:180, vehicle_type:"train", train_number:"S1 4021", carrier:"PKP SKM", platform:"2", track:"502", provider:"plk_rail" },
      { route:"IC", headsign:"Warszawa Centralna", estimated_time:t(18), theoretical_time:t(18), realtime:false, delay_seconds:0, vehicle_type:"train", train_number:"8301", carrier:"PKP Intercity", platform:"3", track:"301", provider:"plk_rail" },
      { route:"R", headsign:"Tczew", estimated_time:t(32), theoretical_time:t(32), realtime:false, delay_seconds:0, vehicle_type:"train", train_number:"91234", carrier:"POLREGIO", platform:"1", provider:"plk_rail" },
    ];

    function makeHass(entities) {
      const states = {};
      for (const [id, provider, stop, deps] of entities) {
        states[id] = { state: deps[0]?.estimated_time ?? "unknown", last_updated: new Date().toISOString(), attributes: { provider, stop_name: stop, last_update: new Date().toISOString(), departures: deps } };
      }
      return { states, callService: async()=>{} };
    }

    function createCard(config, hass, container) {
      const el = document.createElement("mzkzg-transport-card");
      el.setConfig(config);
      el.hass = hass;
      document.getElementById(container).appendChild(el);
    }

    async function init() {
      await new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = `../custom_components/mzkzg_transport/www/mzkzg-transport-card.js?v=${Date.now()}`;
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });

      const hassZtm = makeHass([["sensor.ztm_1205","ztm_gdansk","Brama Wyżynna 01",ztmDeps]]);
      const hassZkm = makeHass([["sensor.zkm_38220","zkm_gdynia","Gdynia Chylonia PKP",zkmDeps]]);
      const hassPlk = makeHass([["sensor.plk_7534","plk_rail","Gdańsk Wrzeszcz",plkDeps]]);
      const hassMulti = makeHass([["sensor.ztm_1205","ztm_gdansk","Brama Wyżynna 01",ztmDeps],["sensor.zkm_38220","zkm_gdynia","Gdynia Chylonia PKP",zkmDeps]]);

      const base = { type:"custom:mzkzg-transport-card", max_departures:5, show_footer:true, show_delays:true, show_bike:true, show_wheelchair:true, show_ac:true, show_ticket_machine:true, tap_action:{action:"none"}, hold_action:{action:"none"}, double_tap_action:{action:"none"} };

      createCard({...base, entities:["sensor.ztm_1205"], display_preset:"standard"}, hassZtm, "card-standard-light");
      createCard({...base, entities:["sensor.ztm_1205"], display_preset:"standard"}, hassZtm, "card-standard-dark");
      createCard({...base, entities:["sensor.zkm_38220"], display_preset:"compact"}, hassZkm, "card-compact");
      createCard({...base, entities:["sensor.plk_7534"], display_preset:"e_ink", icon:"mdi:train"}, hassPlk, "card-eink");
      createCard({...base, entities:["sensor.plk_7534"], display_preset:"standard", icon:"mdi:train"}, hassPlk, "card-plk");
      createCard({...base, entities:["sensor.ztm_1205","sensor.zkm_38220"], display_preset:"standard", view_mode:"tabs"}, hassMulti, "card-tabs");
      createCard({...base, entities:["sensor.ztm_1205","sensor.zkm_38220"], display_preset:"standard", view_mode:"mixed"}, hassMulti, "card-mixed");
    }
    init();
  </script>
</body>
</html>
